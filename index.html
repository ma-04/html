<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sovereign Model Systems</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="ambient" aria-hidden="true"></canvas>
    <div class="noise" aria-hidden="true"></div>

    <header class="shell-header">
      <a class="brand" href="#chapter-core">
        <span class="brand__mark"></span>
        <span class="brand__text">
          <strong>Sovereign Model Systems</strong>

        <span class="header-status__index" data-active-index>01</span>

          <strong data-active-title>Sovereign Core</strong>

      <div class="progress-track" aria-hidden="true">
        <span class="progress-track__fill" data-progress></span>
      </div>

    <nav class="chapter-rail" aria-label="Scene navigation" data-rail></nav>

    <main id="app" class="story"></main>

    <noscript>
